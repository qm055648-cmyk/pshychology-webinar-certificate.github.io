<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="hero-section">

    <div class="logo">MQ CERTIFICATION PORTAL</div>

    <h1>Certificate Verification</h1>
    <p>Enter your Certificate ID</p>

    <!-- SEARCH -->
    <div class="search-box">
        <input type="text" id="studentId" placeholder="e.g. psy-2026-001">
        <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>

</div>

<!-- AUTO CERTIFICATE -->
<div id="certificate" class="certificate-wrapper" style="display:none;">

    <div class="cert-card">

        <h2 class="title">Certificate of Completion</h2>

        <p class="text">This is to certify that</p>
        <h1 id="name" class="name"></h1>

        <p class="text">has successfully completed</p>
        <h3 id="webinar_title" class="course"></h3>

        <p class="text">on</p>
        <p id="certDate" class="date"></p>

    </div>

</div>

<!-- GOOGLE DRIVE CERTIFICATE -->
<iframe id="driveFrame"></iframe>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
