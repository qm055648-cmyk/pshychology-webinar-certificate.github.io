<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>

<body>

<div class="hero-section">

    <div class="logo">PTI OFFICIAL</div>
    <div class="logo">MQ PSYCHOLOGICAL HEALING CENTER</div>

    <h1>Certificate Verification</h1>
    <p>Enter your ID</p>

    <div class="search-box">
        <input type="text" id="studentId" placeholder="Enter ID">
        <button onclick="verify()">Verify</button>
    </div>

    <p id="msg"></p>

    <!-- AUTO CERTIFICATE -->
    <div id="certificate" style="display:none;" class="certificate-wrapper">
        <h2 id="name"></h2>
        <p id="webinar_title"></p>
        <p id="certDate"></p>
    </div>

    <!-- GOOGLE DRIVE CERTIFICATE -->
    <iframe id="driveFrame"></iframe>

</div>

<script src="script.js"></script>

</body>
</html>
